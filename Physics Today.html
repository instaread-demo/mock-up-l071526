  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0 44px; text-align:center;\">\n      <div style=\"width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#4a9fd8,#1a5fa8); margin:0 auto 24px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700;\">5<\u002Fdiv>\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:0.06em; color:#888; margin-bottom:14px;\">SHARE<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px; align-items:center; color:#555; font-size:16px;\"><span>𝐁<\u002Fspan><span>in<\u002Fspan><span>f<\u002Fspan><span>✉<\u002Fspan><span>⚭<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:0.06em; color:#888; margin:26px 0 12px;\">DOWNLOAD<\u002Fdiv>\n      <div style=\"color:#c0392b; font-size:20px;\">🗎<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1 1 auto; min-width:0; max-width:640px;\">\n      <div style=\"background:#fdf6e3; border:1px solid #f0e4c0; border-radius:4px; padding:12px 18px; font-size:14px; color:#555; margin-bottom:22px;\">You've read 1 of 3 free articles this month. Get <a href=\"#\">unlimited access<\u002Fa> to <em>Physics Today<\u002Fem>.<\u002Fdiv>\n      <div style=\"font-size:13px; font-weight:700; letter-spacing:0.03em; color:#1a7fc4; margin-bottom:14px;\">FEATURES / ARTICLE<\u002Fdiv>\n      <h1 style=\"font-family:'PT Serif',Georgia,serif; font-size:42px; font-weight:700; line-height:1.14; color:#111; margin:0 0 16px;\">The elusive signatures of quantum gravity<\u002Fh1>\n      <div style=\"font-size:13px; color:#999; margin-bottom:14px;\">JUN 12, 2026<\u002Fdiv>\n      <p style=\"font-size:17px; line-height:1.6; color:#444; margin:0 0 16px;\">To go beyond classical models and tie our understanding of gravity to the quantum world, experiments are needed.<\u002Fp>\n      <div style=\"font-size:14px; color:#555; margin-bottom:22px;\">DOI: <a href=\"#\">10.1063/pt.ccfccae96a<\u002Fa><\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:24px; border-bottom:1px solid #e2e2e2; padding-bottom:22px; margin-bottom:24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\"><div style=\"width:38px; height:38px; border-radius:50%; overflow:hidden;\"><img src=\"08b27110-3028-4c05-b7da-84b5169da190\" alt=\"Markus Aspelmeyer\" style=\"display:block; width:100%; height:100%; object-fit:cover;\"><\u002Fdiv><span style=\"font-size:16px; font-weight:700; color:#111;\">Markus Aspelmeyer<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:10px;\"><div style=\"width:38px; height:38px; border-radius:50%; overflow:hidden;\"><img src=\"7f0b9cb5-3050-4ece-9d08-346466ba13af\" alt=\"Daniel Carney\" style=\"display:block; width:100%; height:100%; object-fit:cover;\"><\u002Fdiv><span style=\"font-size:16px; font-weight:700; color:#111;\">Daniel Carney<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#e8a800\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"font-family:'PT Serif',Georgia,serif; color:#1a1a1a;\">\n        <p style=\"font-size:18px; line-height:1.75; margin:0 0 24px;\">Gravity is unique among the known fundamental forces of the universe: Currently, there is no experimental result whose explanation requires a quantum theory of gravity. But physicists, including Albert Einstein, have still argued on empirical grounds that quantum theory must modify theories of gravitation. As early as the 1920s, dimensional-analysis arguments suggested that observing any phenomena that meaningfully involved quantum dynamics of the gravitational field is beyond the scope of what's experimentally possible. Thus, the hope of directly testing ideas about quantum gravity with experiments languished for nearly a century.<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.75; margin:0 0 24px;\">Today, the simplest expectation for a quantum theory of gravity is that, at a minimum, states of weak gravitational fields can be in quantum superpositions and be described in terms of gravitons. The hypothesized particles quantize the gravitational field akin to how photons quantize the electromagnetic field. Beyond that simple picture, physicists have quantum gravity models, such as string theory, that support the existence of gravitons at low energy but also work at vastly higher energy scales, where the graviton picture breaks down.<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.75; margin:0 0 24px;\">To answer that, experiments are needed. That may be possible now that scientists have made significant advances in quantum-state control and measurement, which provide not only unprecedented spatial and temporal sensitivity but also new ways to prepare quantum states of macroscopic objects. A prime example is using the kilogram-scale mirrors of the Laser Interferometer Gravitational-Wave Observatory (LIGO) to measure gravitational waves, a measurement that is at the limit of sensitivity set by the Heisenberg uncertainty relation.<\u002Fp>\n\n        <h2 style=\"font-family:'PT Serif',Georgia,serif; font-size:28px; font-weight:700; color:#111; margin:0 0 18px;\">Quantum signatures of gravity<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.75; margin:0 0 24px;\">To determine whether gravity actually requires a quantum interpretation, researchers first need to ask what constitutes a truly quantum signature of gravity. The question turns out to be exceedingly subtle. Many phenomena can be described by both quantum and classical models. Consider, for example, a dilute gas of helium. It behaves classically at room temperature, fully condenses into a quantum superfluid at 0 K, and behaves with a mix of classical and quantum behaviors at low temperatures near absolute zero.<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.75; margin:0;\">Inspiration for how to develop tests of quantum gravity can be found in quantum optics questions that ask what kinds of observations can be explained with only a quantized electromagnetic field. Initially, introducing the idea of photons allowed researchers to quantum mechanically describe all relevant aspects of light–matter interactions, including the photoelectric effect, absorption, spontaneous and stimulated emission of radiation, and the Lamb shift.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:0 0 300px;\">\n      <div style=\"font-family:'PT Serif',Georgia,serif; font-size:22px; font-weight:700; color:#111; margin-bottom:16px;\">Related Topics<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:34px;\"><span style=\"border:1px solid #e2b8c0; color:#c0396a; font-size:12px; font-weight:700; padding:8px 14px; border-radius:3px;\">QUANTUM MECHANICS<\u002Fspan><span style=\"border:1px solid #e2b8c0; color:#c0396a; font-size:12px; font-weight:700; padding:8px 14px; border-radius:3px;\">COSMOLOGY AND RELATIVITY<\u002Fspan><\u002Fdiv>\n      <div style=\"width:100%; aspect-ratio:16/10; background:linear-gradient(135deg,#3a9fd8,#1a6fb0); border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; margin-bottom:34px;\"><div style=\"font-family:'PT Serif',serif; font-weight:700; font-size:30px;\">WE ARE HIRING<\u002Fdiv><div style=\"font-size:13px; margin-top:8px;\">Apply Now<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family:'PT Serif',Georgia,serif; font-size:22px; font-weight:700; color:#111; margin-bottom:16px;\">Related content<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"border-bottom:1px solid #eee; padding-bottom:16px;\"><div style=\"font-size:11px; font-weight:700; color:#1a7fc4; margin-bottom:5px;\">FEATURES / ARTICLE<\u002Fdiv><a href=\"#\" style=\"font-size:16px; font-weight:700; line-height:1.3; color:#111;\">When it comes to science engagement, hire a professional<\u002Fa><\u002Fdiv>\n        <div style=\"border-bottom:1px solid #eee; padding-bottom:16px;\"><div style=\"font-size:11px; font-weight:700; color:#1a7fc4; margin-bottom:5px;\">FEATURES / ARTICLE<\u002Fdiv><a href=\"#\" style=\"font-size:16px; font-weight:700; line-height:1.3; color:#111;\">Willful ignorance of the global impact of nuclear war<\u002Fa><\u002Fdiv>\n        <div><div style=\"font-size:11px; font-weight:700; color:#1a7fc4; margin-bottom:5px;\">NEWS / ARTICLE<\u002Fdiv><a href=\"#\" style=\"font-size:16px; font-weight:700; line-height:1.3; color:#111;\">Q&amp;A: Alice Flarend teaches teens to think out loud<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
