document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight: 800;\n  font-display: swap;\n  src: url(\"640fa958-3ad7-4d56-8ffa-c312a49b4ae4\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f0a2bbb0-85e2-4d1d-9d43-0bc2b5ff7118\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7a4804fc-71ec-4113-a5d5-e02f087ca9bd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#ffffff; }\n  a { color:#c0392b; text-decoration:none; }\n  a:hover { color:#8f2019; text-decoration:underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:'Libre Franklin',Arial,sans-serif; color:#1a1a1a; background:#ffffff;\">\n\n  <img src=\"212bb33d-bc1d-41da-806c-1af7ef5116e2\" alt=\"Healthcare IT News\" style=\"display:block; width:100%; margin:0 auto;\">\n\n  <div style=\"max-width:820px; margin:0 auto; padding:36px 24px 90px;\">\n    <h1 style=\"font-size:44px; font-weight:800; line-height:1.12; color:#111; margin:0 0 20px;\">AI's toughest proving ground may be skilled nursing<\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.5; color:#555; margin:0 0 20px;\">It's arguably the healthcare space's most demanding test bed, where technology must immediately reduce burden, earn clinicians' trust and improve decisions within existing workflows. PointClickCare CEO Dave Wessinger offers perspective.<\u002Fp>\n    <div style=\"display:flex; gap:10px; margin-bottom:26px;\"><span style=\"background:#3a7fd8; color:#fff; font-size:13px; font-weight:600; padding:7px 14px; border-radius:3px;\">Nursing and IT<\u002Fspan><span style=\"background:#3a7fd8; color:#fff; font-size:13px; font-weight:600; padding:7px 14px; border-radius:3px;\">Global<\u002Fspan><\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; justify-content:space-between; border-top:1px solid #e2e2e2; padding-top:18px; margin-bottom:26px;\">\n      <div style=\"font-size:14px; color:#555;\">By <a href=\"#\" style=\"font-weight:600;\">Bill Siwicki<\u002Fa>, <em>Managing Editor<\u002Fem> | July 14, 2026 | 11:07 AM<\u002Fdiv>\n      <div style=\"display:flex; gap:8px;\"><span style=\"width:28px; height:28px; border-radius:4px; background:#1877f2; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:13px;\">f<\u002Fspan><span style=\"width:28px; height:28px; border-radius:4px; background:#000; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:13px;\">𝕏<\u002Fspan><span style=\"width:28px; height:28px; border-radius:4px; background:#0a66c2; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:13px;\">in<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#c0392b\" hint-size=\"100%,140px\" style=\"margin:0 0 30px; display:block;\"><\u002Fdc-import>\n\n    <div style=\"position:relative; margin-bottom:8px;\">\n      <img src=\"e56716e5-444d-441b-a6b6-6b1e3c8fcfa8\" alt=\"Dave Wessinger, PointClickCare's co-founder and CEO\" style=\"display:block; width:100%;\">\n      <div style=\"position:absolute; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); color:#fff; font-size:14px; font-weight:600; padding:12px 16px;\">Dave Wessinger, PointClickCare's co-founder and CEO<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12.5px; color:#888; text-align:right; margin-bottom:30px;\">Photo: PointClickCare<\u002Fdiv>\n\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 24px;\">Healthcare so far has largely embraced a familiar narrative around artificial intelligence evolution: Breakthrough technologies emerge inside academic medical centers, prove themselves in sophisticated health systems and eventually filter into the rest of healthcare.<\u002Fp>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 24px;\">Dave Wessinger believes that sequence is backward.<\u002Fp>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 24px;\">Wessinger, co-founder and CEO of PointClickCare, the EHR and billing software vendor, said that skilled nursing facilities represent healthcare's most unforgiving operating environment.<\u002Fp>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 30px;\">And if AI can withstand the realities of long-term care – limited staffing, relentless documentation requirements, complex residents and constant regulatory oversight – it has a far better chance of succeeding across the broader healthcare ecosystem.<\u002Fp>\n\n    <h2 style=\"font-size:30px; font-weight:800; color:#111; margin:0 0 18px;\">A proving ground with little margin for error<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 24px;\">\"Skilled nursing facilities operate with narrow margins, stretched teams and clinically complex residents,\" he explained. \"Regulations and documentation keep growing, and the workforce has been asked to do more with less. That means there is no capacity for waste, so AI does not get a long runway here. The work must become easier the day it's turned on.\"<\u002Fp>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 30px;\">Unlike many AI pilots that tolerate months of refinement, long-term care offers little patience for technology that adds clicks or forces caregivers into unfamiliar workflows. Nurses cannot reasonably be expected to learn another application today in exchange for promised efficiencies tomorrow, Wessinger said.<\u002Fp>\n\n    <h2 style=\"font-size:30px; font-weight:800; color:#111; margin:0 0 18px;\">Trust begins with explainability<\u002Fh2>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0 0 24px;\">\"Trust in healthcare AI is not created in a boardroom,\" he said. \"It's earned at the bedside, one interaction at a time.\"<\u002Fp>\n    <p style=\"font-size:17px; line-height:1.8; color:#333; margin:0;\">For Wessinger, explainability is less about exposing algorithms than giving clinicians understandable reasons for recommendations. Fragmented data remains healthcare's greatest obstacle. AI built on incomplete information may sound confident while producing unreliable guidance, eroding trust almost immediately.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
