  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight: 800;\n  font-display: swap;\n  src: url(\"3f93fd18-55d1-40ce-8ebe-7b6196b40a7f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9132c366-a919-4e25-9cbc-06a3b1cc4f4f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7347a9dd-3303-4f1c-99d9-e9cc502bcef8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#ffffff; }\n  a { color:#1876c9; text-decoration:none; }\n  a:hover { color:#115a9c; text-decoration:underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:'Libre Franklin',Arial,sans-serif; color:#222; background:#ffffff;\">\n\n  <div style=\"border-bottom:1px solid #eee;\">\n    <img src=\"631a7787-6bc7-4d5e-9205-e365b198f96b\" alt=\"Chillicothe Gazette\" style=\"display:block; width:100%; margin:0 auto;\">\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px; margin:0 auto; padding:26px 24px 80px; display:flex; gap:48px; align-items:flex-start;\">\n\n    <div style=\"flex:1 1 auto; min-width:0; max-width:640px;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.04em; color:#555; margin-bottom:12px;\">LOCAL<\u002Fdiv>\n      <h1 style=\"font-size:36px; font-weight:800; line-height:1.15; color:#111; margin:0 0 16px;\">New grant brings trauma resources to southern Ohio families<\u002Fh1>\n      <div style=\"font-size:14px; margin-bottom:6px;\"><strong style=\"color:#111;\">Jane Imbody<\u002Fstrong> <span style=\"color:#555;\">Chillicothe Gazette<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:13px; color:#888; margin-bottom:16px;\">July 13, 2026, 5:06 a.m. ET<\u002Fdiv>\n      <div style=\"display:flex; gap:14px; font-size:16px; color:#555; border-bottom:1px solid #e2e2e2; padding-bottom:18px; margin-bottom:24px;\"><span style=\"width:30px; height:30px; border-radius:50%; background:#1877f2; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:14px;\">f<\u002Fspan><span>𝕏<\u002Fspan><span>✉<\u002Fspan><span>➦<\u002Fspan><\u002Fdiv>\n\n      <dc-import name=\"AudioPlayer\" bg=\"#ffffff\" accent=\"#1876c9\" hint-size=\"100%,140px\" style=\"margin:0 0 26px; display:block;\"><\u002Fdc-import>\n\n      <div style=\"width:100%; margin-bottom:6px;\"><img src=\"498380c2-b484-425d-aa03-8c660232ab75\" alt=\"Other than books, what does the Chillicothe-Ross County Public Library offer?\" style=\"display:block; width:100%;\"><\u002Fdiv>\n      <div style=\"font-size:13px; color:#666; border-bottom:1px solid #eee; padding-bottom:14px; margin-bottom:22px;\"><strong>Other than books, what does the Chillicothe-Ross County Public Library offer?<\u002Fstrong><br>From books, to a ghost-hunting kit and bikes, what does the library offer other than books?<\u002Fdiv>\n\n      <div style=\"font-family:'Georgia',serif; color:#1a1a1a;\">\n        <p style=\"font-size:18px; line-height:1.8; margin:0 0 24px;\">The <a href=\"#\">Garden Family Advocacy Center<\u002Fa> has received a federal grant that will provide hundreds of educational books, guides and graphic novels for children, families and community partners across southern Ohio, according to a community announcement.<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.8; margin:0 0 24px;\">The Chillicothe-based child advocacy center was selected as a recipient of funding through the Office for Victims of Crime. The grant submitted by Executive Director Rhiannon Moore supplied materials designed to help people affected by trauma better understand available services, court processes and recovery resources.<\u002Fp>\n\n        <div style=\"width:100%; aspect-ratio:16/10; background:#111; margin-bottom:8px;\"><\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#888; border-bottom:1px solid #eee; padding-bottom:14px; margin-bottom:22px;\">Brooke Smith, Rhiannon Moore and Abigail Chester sort materials provided by the grant that was recently awarded to the Garden Family Advocacy Center. <em>Provided By Garden Family Advocacy Center<\u002Fem><\u002Fdiv>\n\n        <p style=\"font-size:18px; line-height:1.8; margin:0 0 24px;\">\"We are deeply grateful to receive this grant, which will help ensure that individuals and families impacted by trauma have access to critical educational resources and support,\" Moore said. \"Education plays a vital role during traumatic times, providing knowledge, stability, empowerment and hope when uncertainty can feel overwhelming.\"<\u002Fp>\n        <p style=\"font-size:18px; line-height:1.8; margin:0;\">The grant program partners with the Center for Urban Pedagogy and the Center for Court Innovation to create educational materials addressing issues that victims of violence and trauma may encounter. Resources include booklets, novellas, graphic novels and guides covering topics such as family court, criminal court, human trafficking, abuse, foster care and mental health.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:0 0 300px;\">\n      <div style=\"background:#f2f2f2; text-align:center; font-size:11px; color:#aaa; padding:8px; margin-bottom:6px;\">Advertisement<\u002Fdiv>\n      <div style=\"background:#f2f2f2; height:250px; margin-bottom:30px;\"><\u002Fdiv>\n      <div style=\"font-weight:800; font-size:18px; color:#111; border-bottom:2px solid #111; padding-bottom:8px; margin-bottom:16px;\">More Stories<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"display:flex; gap:12px;\"><div style=\"width:90px; height:60px; background:#6a8a4a; flex:0 0 90px;\"><\u002Fdiv><div><a href=\"#\" style=\"font-size:14px; font-weight:700; line-height:1.35; color:#111;\">Explosive diarrhea outbreak probe zeroes in on source. Ohio numbers<\u002Fa><div style=\"font-size:11px; color:#999;\">NEWS<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:12px;\"><div style=\"width:90px; height:60px; background:#4a4a4a; flex:0 0 90px;\"><\u002Fdiv><div><a href=\"#\" style=\"font-size:14px; font-weight:700; line-height:1.35; color:#111;\">Chillicothe city officials shocked by data center news<\u002Fa><div style=\"font-size:11px; color:#999;\">NEWS<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:12px;\"><div style=\"width:90px; height:60px; background:#3a5a8a; flex:0 0 90px;\"><\u002Fdiv><div><a href=\"#\" style=\"font-size:14px; font-weight:700; line-height:1.35; color:#111;\">No annual fees for life<\u002Fa><div style=\"font-size:11px; color:#999;\">UnionBank Cr... | Sponsored Links<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
