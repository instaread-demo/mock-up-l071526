document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Oswald';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d05ba815-fa60-42e3-bd74-77b224f61897\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#151515; }\n  a { color:#e8681e; text-decoration:none; }\n  a:hover { color:#b8501a; text-decoration:underline; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:'Libre Franklin',Arial,sans-serif; color:#e0e0e0; background:#151515;\">\n\n  <img src=\"1b3f2ee2-825d-4d5e-915c-828c4c7ddee6\" alt=\"Camera Jabber\" style=\"display:block; width:100%; margin:0 auto;\">\n\n  <div style=\"position:relative; background:#2a2a2a;\">\n    <div style=\"width:100%; aspect-ratio:16/6; background:linear-gradient(160deg,#3a3a3a,#141414);\"><\u002Fdiv>\n    <div style=\"position:absolute; inset:0; max-width:1400px; margin:0 auto; padding:40px; box-sizing:border-box; display:flex; flex-direction:column; justify-content:center;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:0.06em; color:#fff; border-bottom:2px solid #d8641e; display:inline-block; width:fit-content; padding-bottom:4px; margin-bottom:18px;\">PHOTOGRAPHY NEWS<\u002Fdiv>\n      <h1 style=\"font-family:'Oswald',sans-serif; font-size:44px; font-weight:600; line-height:1.1; color:#fff; margin:0 0 30px; max-width:640px;\">JOYROOM PODIX PR70 power bank launches on Kickstarter<\u002Fh1>\n      <div style=\"display:flex; align-items:center; gap:14px;\">\n        <div style=\"width:52px; height:52px; border-radius:50%; overflow:hidden;\"><img src=\"068d466f-ada0-4586-9f5e-63fec751f59e\" alt=\"Ali Jennings\" style=\"display:block; width:100%; height:100%; object-fit:cover;\"><\u002Fdiv>\n        <div style=\"font-size:13px; color:#fff; line-height:1.5;\"><strong style=\"font-size:15px;\">Ali Jennings<\u002Fstrong><br>Camera Jabber Author<br><strong>Published:<\u002Fstrong> <em>14th July 2026<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1400px; margin:0 auto; padding:44px 24px 90px; display:flex; gap:44px; align-items:flex-start;\">\n    <div style=\"flex:1 1 auto; min-width:0; max-width:900px;\">\n\n      <dc-import name=\"AudioPlayer\" bg=\"#1f1f1f\" accent=\"#d8641e\" hint-size=\"100%,140px\" style=\"margin:0 0 34px; display:block;\"><\u002Fdc-import>\n\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 24px;\">High-capacity power banks may not be the most glamorous photography accessories, but they're becoming increasingly essential for anyone working away from mains power. Whether you're charging mirrorless cameras, drones, LED lights, laptops or smartphones, a high-output battery pack can quickly become one of the most valuable pieces of kit in your bag.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 24px;\">JOYROOM is aiming squarely at that audience with the new PODIX PR70, a 240W power bank that launches on Kickstarter on 14 July. Designed for creators, travellers, remote workers and heavy device users, it combines high-power USB-C charging with dual TFT displays that provide real-time charging information.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 30px;\">The headline figure is its 240W combined output. That's enough power to fast-charge many modern USB-C laptops while simultaneously topping up cameras, phones or other accessories, making the PR70 considerably more versatile than the average portable battery. JOYROOM also says the unit supports up to five devices at once, with two built-in USB-C cables designed to retract neatly into the body to reduce cable clutter when travelling.<\u002Fp>\n\n      <div style=\"text-align:center; font-size:11px; letter-spacing:0.14em; color:#777; margin:0 0 20px;\">ADVERTISEMENT<\u002Fdiv>\n      <div style=\"text-align:center; color:#555; font-size:30px; letter-spacing:0.3em; margin:0 0 40px;\">. . .<\u002Fdiv>\n\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 24px;\">One of the more distinctive features is the pair of integrated TFT displays. Rather than showing only the remaining battery percentage, the screens provide live information including charging wattage, power distribution and charging status. For photographers and videographers who routinely juggle multiple batteries and devices between shoots, that kind of visibility can be genuinely useful when managing power throughout a long working day.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 24px;\">At the time of writing, JOYROOM has shared only limited technical information ahead of the Kickstarter launch. The company has confirmed the 240W total output and 100W charging input, but a complete specification sheet—including battery capacity, port configuration and individual port power ratings—has yet to be published.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 30px;\">As with any crowdfunding campaign, it's worth remembering that the PODIX PR70 remains a pre-production product rather than a retail release. While JOYROOM has previously completed successful Kickstarter campaigns for its charging products, backing a crowdfunding project always carries an element of delivery risk that buyers should consider before pledging.<\u002Fp>\n\n      <h2 style=\"font-family:'Oswald',sans-serif; font-size:26px; font-weight:600; color:#fff; margin:0 0 16px;\">JOYROOM PODIX PR70 specifications<\u002Fh2>\n      <div style=\"font-size:15px; line-height:1.9; color:#cfcfcf; margin:0 0 30px;\">\n        <div><strong style=\"color:#fff;\">Product type:<\u002Fstrong> portable USB-C power bank.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Maximum total output:<\u002Fstrong> 240W.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Maximum input:<\u002Fstrong> 100W USB-C charging.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Displays:<\u002Fstrong> dual TFT displays showing live charging information.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Simultaneous charging:<\u002Fstrong> supports up to five devices.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Built-in cables:<\u002Fstrong> two retractable USB-C cables.<\u002Fdiv>\n        <div><strong style=\"color:#fff;\">Target users:<\u002Fstrong> creators, travellers, remote workers and power users.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Oswald',sans-serif; font-size:26px; font-weight:600; color:#fff; margin:0 0 16px;\">JOYROOM PODIX PR70 price and availability<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.8; color:#cfcfcf; margin:0 0 24px;\">The official Kickstarter super early bird price is US$79. Official UK and Euro pricing has not been announced. The JOYROOM PODIX PR70 launches on Kickstarter on <strong style=\"color:#fff;\">14 July 2026<\u002Fstrong>.<\u002Fp>\n      <p style=\"margin:0 0 10px;\"><a href=\"#\">JOYROOM PODIX Kickstarter campaign<\u002Fa><\u002Fp>\n      <p style=\"margin:0;\"><a href=\"#\">JOYROOM official website<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"flex:0 0 300px;\">\n      <div style=\"width:100%; background:#fff; border-radius:8px; padding:20px; box-sizing:border-box;\">\n        <img src=\"ff2c21e3-d3d6-4b49-b6fd-31de487f2520\" alt=\"JOYROOM PODIX PR70 power bank\" style=\"display:block; width:100%; border-radius:6px;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
